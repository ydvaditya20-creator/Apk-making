<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My App</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#fff;
}

#web-frame{
    width:100%;
    height:100%;
    border:none;
    display:none;
}

#offline-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
    background:#fff;
}

.icon{
    font-size:70px;
    margin-bottom:15px;
}

.title{
    font-size:24px;
    font-weight:bold;
    color:#222;
    margin-bottom:10px;
}

.message{
    color:#666;
    font-size:16px;
    margin-bottom:25px;
}

.btn{
    background:#007bff;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="offline-screen">
    <div class="icon">📶</div>
    <div class="title">No Internet Connection</div>
    <div class="message">
        Please connect to Wi-Fi or Mobile Data.
    </div>
    <button class="btn" onclick="checkInternet()">
        Retry
    </button>
</div>

<iframe
    id="web-frame"
    src="about:blank">
</iframe>

<script>
const WEBSITE_URL = "https://ydvaditya20-creator.github.io/LL-salary/";

const offlineScreen = document.getElementById("offline-screen");
const webFrame = document.getElementById("web-frame");

function showOnline() {
    offlineScreen.style.display = "none";
    webFrame.style.display = "block";

    if (webFrame.src === "about:blank") {
        webFrame.src = WEBSITE_URL;
    }
}

function showOffline() {
    offlineScreen.style.display = "flex";
    webFrame.style.display = "none";
}

function checkInternet() {

    if (navigator.onLine === false) {
        showOffline();
        return;
    }

    const img = new Image();

    img.onload = function () {
        showOnline();
    };

    img.onerror = function () {
        showOffline();
    };

    img.src =
        "https://www.gstatic.com/generate_204?t=" +
        Date.now();
}

window.addEventListener("online", checkInternet);
window.addEventListener("offline", showOffline);

checkInternet();

setInterval(checkInternet, 10000);
</script>

</body>
</html>
