<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My App</title>
    <style>
        /* Poori screen ko set karne ke liye takki scrollbar na aaye */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: sans-serif;
        }

        /* Error Screen ki styling */
        #error-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #error-screen h2 {
            color: #d9534f;
            margin-bottom: 10px;
            font-size: 24px;
        }

        #error-screen p {
            color: #666666;
            font-size: 16px;
        }

        /* Iframe ki styling */
        #my-iframe {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Error Message Screen (Sirf tab dikhegi jab net band hoga) -->
    <div id="error-screen">
        <h2>Internet Connection Nahi Hai</h2>
        <p>Kripya apna net chalu karein aur app ko dobara kholein.</p>
    </div>

    <!-- Aapka Iframe (Sirf tab dikhega aur load hoga jab net chalu hoga) -->
    <iframe id="my-iframe" src=""></iframe>

    <script>
        window.addEventListener('load', function() {
            var iframe = document.getElementById('my-iframe');
            var errorScreen = document.getElementById('error-screen');

            // NOTE: "APNA_GITHUB_PAGES_URL_YAHAN_LIKHEIN" ko apne asli URL se badlein
            var targetUrl = "https://ydvaditya20-creator.github.io/LL-salary/";

            if (navigator.onLine) {
                // Agar internet chalu hai
                iframe.src = targetUrl;
                iframe.style.display = "block";
                errorScreen.style.display = "none";
            } else {
                // Agar internet band hai
                errorScreen.style.display = "flex";
                iframe.style.display = "none";
            }
        });
    </script>

</body>
</html>
