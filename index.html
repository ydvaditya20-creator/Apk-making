<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My App</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
font-family:Arial,sans-serif;
}

#offline{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
justify-content:center;
align-items:center;
flex-direction:column;
background:white;
text-align:center;
}

#frame{
width:100%;
height:100%;
border:none;
display:none;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
background:#1976d2;
color:white;
}
</style>
</head>
<body>

<div id="offline">
<h2>📶 No Internet Connection</h2>
<p>Please check your network connection.</p>
<button onclick="startApp()">Retry</button>
</div>

<iframe id="frame"></iframe>

<script>
const URL = "https://ydvaditya20-creator.github.io/LL-salary/";

function startApp(){

 if(navigator.onLine){

   document.getElementById("offline").style.display="none";

   const frame=document.getElementById("frame");
   frame.style.display="block";
   frame.src=URL;

 }else{

   document.getElementById("frame").style.display="none";
   document.getElementById("offline").style.display="flex";

 }

}

window.addEventListener("online",startApp);
window.addEventListener("offline",startApp);

startApp();
</script>

</body>
</html>
