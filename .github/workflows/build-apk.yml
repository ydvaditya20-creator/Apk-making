name: Build APK

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install Dependencies
    run: npm install

  - name: Install Capacitor
    run: npm install @capacitor/core @capacitor/android @capacitor/cli

  - name: Create Web Folder
    run: |
      mkdir -p www
      cp index.html www/

  - name: Create Capacitor Config
    run: |
      echo '{"appId":"com.example.myapp","appName":"MyApp","webDir":"www"}' > capacitor.config.json

  - name: Add Android
    run: npx cap add android

  - name: Sync Android
    run: npx cap sync android

  - name: Build APK
    run: |
      cd android
      chmod +x gradlew
      ./gradlew assembleDebug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: app-debug
      path: android/app/build/outputs/apk/debug/app-debug.apk
```
