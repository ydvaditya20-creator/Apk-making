name: Build HTML to APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        # Yahan aidl aur baki zaroori tools ko add kiya hai
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev build-essential libstdc++6 aidl
        pip install --user --upgrade buildozer Cython virtualenv

    - name: Create Config and Build APK
      run: |
        # Configuration file generate karna
        echo '[app]' > buildozer.spec
        echo 'title = My First App' >> buildozer.spec
        echo 'package.name = myfirstapp' >> buildozer.spec
        echo 'package.domain = org.test' >> buildozer.spec
        echo 'source.dir = .' >> buildozer.spec
        echo 'source.include_exts = html,css,js' >> buildozer.spec
        echo 'version = 0.1' >> buildozer.spec
        echo 'requirements = python3,kivy' >> buildozer.spec
        echo 'orientation = portrait' >> buildozer.spec
        echo 'fullscreen = 1' >> buildozer.spec
        echo 'android.archs = arm64-v8a' >> buildozer.spec
        echo 'android.allow_backup = True' >> buildozer.spec
        
        # LICENSE ERROR FIX: Yeh line Android SDK ke licenses ko automatic accept kar legi
        echo 'android.accept_sdk_license = True' >> buildozer.spec
        
        # Buildozer ko verbose mode aur automatic yes ke sath chalana
        ~/.local/bin/buildozer -v android debug --yes

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: bin/*.apk
